name: Daily release

on:
  schedule:
    - cron: "43 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Check repository files
        run: python scripts/check_repository.py
      - name: Build and validate
        run: |
          test -d tests
          test -n "$(find tests -name 'test_*.py' -print -quit)"
          python -m pytest -q tests
          python scripts/build.py
          python scripts/validate_outputs.py
      - name: Package dist artifacts
        run: |
          tar -czf ai-crawler-blocklist-dist.tar.gz dist
      - name: Create or update daily release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="daily-$(date -u +%Y-%m-%d)"
          title="AI Crawler Blocklists $(date -u +%Y-%m-%d)"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" ai-crawler-blocklist-dist.tar.gz dist/metadata.json dist/sources-report.md --clobber
          else
            gh release create "$tag" ai-crawler-blocklist-dist.tar.gz dist/metadata.json dist/sources-report.md \
              --title "$title" \
              --notes "Daily generated AI crawler blocklists."
          fi
